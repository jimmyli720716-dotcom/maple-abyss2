<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>深淵遠征隊 第5季 - 混合排序版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .btn-group { display: flex; justify-content: space-between; margin-bottom: 15px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #e0e0e0; padding: 12px; text-align: center; }
        th { background-color: #34495e; color: white; position: sticky; top: 0; z-index: 10; }
        .rank { font-size: 11px; padding: 2px 6px; border-radius: 4px; color: white; margin-right: 8px; display: inline-block; min-width: 50px; text-align: center; }
        .rank-特殊 { background-color: #c0392b; animation: glow 1.5s infinite alternate; }
        .rank-特級 { background-color: #e67e22; }
        .rank-最上級 { background-color: #8e44ad; }
        .rank-上級 { background-color: #2980b9; }
        .rank-中級 { background-color: #27ae60; }
        .rank-下級 { background-color: #95a5a6; }
        @keyframes glow { from { box-shadow: 0 0 5px #ff0000; } to { box-shadow: 0 0 15px #ff0000; } }
        .member-name { text-align: left; font-weight: bold; border-left: 6px solid #ccc; padding-left: 10px; }
        .cat-劍士 { border-left-color: #e74c3c; background-color: #fffafa; }
        .cat-法師 { border-left-color: #3498db; background-color: #f4faff; }
        .cat-弓箭手 { border-left-color: #2ecc71; background-color: #f4fff6; }
        .cat-盜賊 { border-left-color: #9b59b6; background-color: #fbf4ff; }
        .cat-海盜 { border-left-color: #f1c40f; background-color: #fffcf4; }
        .is-checked { background-color: #e8f5e9 !important; border-left: 2px solid #27ae60; }
        tr:hover td { background-color: #eaeaea !important; }
        input[type="checkbox"] { transform: scale(1.6); cursor: pointer; }
        button { padding: 8px 15px; border-radius: 5px; border: none; color: white; cursor: pointer; font-weight: bold; }
        .btn-clear { background: #e74c3c; }
        .btn-export { background: #27ae60; }
    </style>
</head>
<body>
<div class="container">
    <h2>深淵遠征隊 第5季 (置頂看級別 / 未收看職業)</h2>
    <div class="btn-group">
        <button class="btn-clear" onclick="clearData()">清空所有紀錄</button>
        <button class="btn-export" onclick="exportCode()">分享/備份代碼</button>
    </div>
    <table>
        <thead>
            <tr>
                <th width="35%">傭兵名稱 (等級/職業)</th>
                <th>帳 1</th><th>帳 2</th><th>帳 3</th><th>帳 4</th><th>帳 5</th>
            </tr>
        </thead>
        <tbody id="list-body"></tbody>
    </table>
</div>

<script>
    const jobOrder = { "劍士": 1, "法師": 2, "弓箭手": 3, "盜賊": 4, "海盜": 5 };
    const rankOrder = { "特殊": 1, "特級": 2, "最上級": 3, "上級": 4, "中級": 5, "下級": 6 };

    const data = [
        { id: 1, r: "特殊", n: "盜賊 芬" },
        { id: 2, r: "特級", n: "劍士 斯托尼" }, { id: 3, r: "特級", n: "劍士 多藝" }, { id: 4, r: "特級", n: "劍士 貝魯" },
        { id: 5, r: "特級", n: "法師 利美" }, { id: 6, r: "特級", n: "法師 寧寧" },
        { id: 7, r: "特級", n: "弓箭手 松松" }, { id: 8, r: "特級", n: "弓箭手 伊斯頓" },
        { id: 9, r: "特級", n: "盜賊 汀汀" }, { id: 10, r: "特級", n: "盜賊 西河" },
        { id: 11, r: "特級", n: "海盜 雅各布" }, { id: 12, r: "特級", n: "海盜 哈魯艾爾" }, { id: 13, r: "特級", n: "海盜 艾拉尼" },
        { id: 14, r: "最上級", n: "劍士 瑪諾斯" }, { id: 15, r: "最上級", n: "劍士 巴隆" },
        { id: 16, r: "最上級", n: "法師 布里艾" }, { id: 17, r: "最上級", n: "法師 莉莎貝爾" }, { id: 18, r: "最上級", n: "法師 露娜" },
        { id: 19, r: "最上級", n: "弓箭手 賽爾文" }, { id: 20, r: "最上級", n: "弓箭手 伊拉達" },
        { id: 21, r: "最上級", n: "盜賊 潔克琳" }, { id: 22, r: "最上級", n: "盜賊 羅薩里奧" }, { id: 23, r: "最上級", n: "盜賊 庫娜" },
        { id: 24, r: "最上級", n: "海盜 Boom" }, { id: 25, r: "最上級", n: "海盜 冬天" },
        { id: 26, r: "上級", n: "劍士 阿諾德" }, { id: 27, r: "上級", n: "劍士 傑因" },
        { id: 28, r: "上級", n: "法師 舒布拉" }, { id: 29, r: "上級", n: "法師 艾爾拉" }, { id: 30, r: "上級", n: "法師 卡婭" },
        { id: 31, r: "上級", n: "弓箭手 洛尼" }, { id: 32, r: "上級", n: "弓箭手 馬可" },
        { id: 33, r: "上級", n: "盜賊 幸運" }, { id: 34, r: "上級", n: "盜賊 多仁" },
        { id: 35, r: "上級", n: "海盜 梅利爾" }, { id: 36, r: "上級", n: "海盜 在伊" },
        { id: 37, r: "中級", n: "劍士 萊爾普" }, { id: 38, r: "中級", n: "劍士 西林" },
        { id: 39, r: "中級", n: "法師 艾爾比絲" }, { id: 40, r: "中級", n: "法師 梅里" },
        { id: 41, r: "中級", n: "弓箭手 普雷伊" }, { id: 42, r: "宣級", n: "弓箭手 江江" }, { id: 43, r: "中級", n: "弓箭手 凱羅" },
        { id: 44, r: "中級", n: "盜賊 米斯緹" }, { id: 45, r: "中級", n: "盜賊 丹尼爾" },
        { id: 46, r: "中級", n: "海盜 修莉" }, { id: 47, r: "中級", n: "海盜 吉恩" },
        { id: 48, r: "下級", n: "劍士 裴斯" }, { id: 49, r: "下級", n: "劍士 羅迪亞娜" }, { id: 50, r: "下級", n: "劍士 塔拉" },
        { id: 51, r: "下級", n: "法師 娜美" }, { id: 52, r: "下級", n: "法師 麗安" }, { id: 53, r: "下級", n: "法師 哲利" },
        { id: 54, r: "下級", n: "弓箭手 比爾" }, { id: 55, r: "下級", n: "弓箭手 倉武" }, { id: 56, r: "下級", n: "弓箭手 布雷迪" },
        { id: 57, r: "下級", n: "盜賊 尼爾" }, { id: 58, r: "下級", n: "盜賊 餅乾" },
        { id: 59, r: "下級", n: "海盜 奧莉薇" }, { id: 60, r: "下級", n: "海盜 虎克" }, { id: 61, r: "下級", n: "海盜 星星家" }
    ];

    const KEY = 'abyss_v5_mixed_sort';
    const body = document.getElementById('list-body');

    function renderTable() {
        const saved = JSON.parse(localStorage.getItem(KEY) || "{}");
        
        const sortedData = [...data].sort((a, b) => {
            const aChecked = [1,2,3,4,5].some(num => saved[`${a.id}-${num}`]);
            const bChecked = [1,2,3,4,5].some(num => saved[`${b.id}-${num}`]);

            // 1. 如果兩邊勾選狀態不同，已勾選的排前面
            if (aChecked && !bChecked) return -1;
            if (!aChecked && bChecked) return 1;

            // 2. 如果都「已勾選」：按級別排序 (特殊 > 特級 > ...)
            if (aChecked && bChecked) {
                if (rankOrder[a.r] !== rankOrder[b.r]) return rankOrder[a.r] - rankOrder[b.r];
                return jobOrder[a.n.split(' ')[0]] - jobOrder[b.n.split(' ')[0]];
            }

            // 3. 如果都「未勾選」：按職業排序 (劍 > 法 > ...)
            const aJob = a.n.split(' ')[0];
            const bJob = b.n.split(' ')[0];
            if (jobOrder[aJob] !== jobOrder[bJob]) return jobOrder[aJob] - jobOrder[bJob];
            return rankOrder[a.r] - rankOrder[b.r];
        });

        body.innerHTML = '';
        sortedData.forEach(item => {
            const tr = document.createElement('tr');
            const job = item.n.split(' ')[0];
            const hasAnyCheck = [1,2,3,4,5].some(num => saved[`${item.id}-${num}`]);
            if (hasAnyCheck) tr.classList.add('is-checked');

            tr.innerHTML = `<td class="member-name cat-${job}"><span class="rank rank-${item.r}">${item.r}</span>${item.n}</td>`;
            
            for (let i = 1; i <= 5; i++) {
                const td = document.createElement('td');
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.checked = !!saved[`${item.id}-${i}`];
                cb.onchange = () => {
                    const current = JSON.parse(localStorage.getItem(KEY) || "{}");
                    current[`${item.id}-${i}`] = cb.checked;
                    localStorage.setItem(KEY, JSON.stringify(current));
                    renderTable();
                };
                td.onclick = (e) => { if(e.target !== cb) { cb.click(); } };
                td.appendChild(cb);
                tr.appendChild(td);
            }
            body.appendChild(tr);
        });
    }

    function clearData() { if(confirm("確定要清空嗎？")) { localStorage.removeItem(KEY); renderTable(); } }
    function exportCode() { prompt("備份代碼：", btoa(localStorage.getItem(KEY) || "{}")); }

    renderTable();
</script>
</body>
</html>
