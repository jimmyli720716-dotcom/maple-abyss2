<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>深淵遠征隊 第5季 - 傭兵追蹤工具</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .btn-group { display: flex; justify-content: space-between; margin-bottom: 15px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #e0e0e0; padding: 12px; text-align: center; }
        th { background-color: #34495e; color: white; position: sticky; top: 0; }
        .rank { font-size: 11px; padding: 2px 6px; border-radius: 4px; color: white; margin-right: 8px; display: inline-block; min-width: 50px; text-align: center; }
        .rank-特殊 { background-color: #c0392b; animation: glow 1.5s infinite alternate; }
        .rank-特級 { background-color: #e67e22; }
        .rank-最上級 { background-color: #8e44ad; }
        .rank-上級 { background-color: #2980b9; }
        .rank-中級 { background-color: #27ae60; }
        .rank-下級 { background-color: #95a5a6; }
        @keyframes glow { from { box-shadow: 0 0 5px #ff0000; } to { box-shadow: 0 0 15px #ff0000; } }
        .member-name { text-align: left; font-weight: bold; border-left: 6px solid #ccc; padding-left: 10px; }
        .cat-特殊 { border-left-color: #000; }
        .cat-劍士 { border-left-color: #e74c3c; background-color: #fffafa; }
        .cat-法師 { border-left-color: #3498db; background-color: #f4faff; }
        .cat-弓箭手 { border-left-color: #2ecc71; background-color: #f4fff6; }
        .cat-盜賊 { border-left-color: #9b59b6; background-color: #fbf4ff; }
        .cat-海盜 { border-left-color: #f1c40f; background-color: #fffcf4; }
        tr:hover td { background-color: #eaeaea !important; }
        input[type="checkbox"] { transform: scale(1.6); cursor: pointer; }
        button { padding: 8px 15px; border-radius: 5px; border: none; color: white; cursor: pointer; font-weight: bold; }
        .btn-clear { background: #e74c3c; }
        .btn-export { background: #27ae60; }
    </style>
</head>
<body>
<div class="container">
    <h2>深淵遠征隊 第5季 傭兵追蹤表</h2>
    <div class="btn-group">
        <button class="btn-clear" onclick="clearData()">清空所有紀錄</button>
        <button class="btn-export" onclick="exportCode()">分享/備份代碼</button>
    </div>
    <table>
        <thead>
            <tr>
                <th width="35%">傭兵名稱 (等級/職業)</th>
                <th>帳 1</th><th>帳 2</th><th>帳 3</th><th>帳 4</th><th>帳 5</th>
            </tr>
        </thead>
        <tbody id="list-body"></tbody>
    </table>
</div>

<script>
    // 嚴格依據：等級(高至低) -> 職業(劍>法>弓>盜>海) 排序
    const data = [
        // 特殊 (1)
        { r: "特殊", n: "特殊 芬" },
        
        // 特級 (20)
        { r: "特級", n: "劍士 巴爾" }, { r: "特級", n: "劍士 斯尼尼" }, { r: "特級", n: "劍士 希爾" }, { r: "特級", n: "劍士 貝魯" },
        { r: "特級", n: "法師 貝洛甘曼" }, { r: "特級", n: "法師 露娜" }, { r: "特級", n: "法師 利奧" }, { r: "特級", n: "法師 寧寧" },
        { r: "特級", n: "弓箭手 伊莉雅" }, { r: "特級", n: "弓箭手 泰松" }, { r: "特級", n: "弓箭手 伊莉莎白" },
        { r: "特級", n: "盜賊 羅蘭提亞" }, { r: "特級", n: "盜賊 康德" }, { r: "特級", n: "盜賊 汀汀" }, { r: "特級", n: "盜賊 西珂" }, { r: "特級", n: "盜賊 玲" },
        { r: "特級", n: "海盜 摩天" }, { r: "特級", n: "海盜 普魯布" }, { r: "特級", n: "海盜 哈魯艾普" }, { r: "特級", n: "海盜 艾拉尼" },

        // 最上級 (17)
        { r: "最上級", n: "劍士 阿爾騰" }, { r: "最上級", n: "劍士 蘭岡" }, { r: "最上級", n: "劍士 瑪嘉莉" },
        { r: "最上級", n: "法師 赫布拉" }, { r: "最上級", n: "法師 艾瑞拉" }, { r: "最上級", n: "法師 卡恩" }, { r: "最上級", n: "法師 查理艾" },
        { r: "最上級", n: "弓箭手 莉雅" }, { r: "最上級", n: "弓箭手 庫特" }, { r: "最上級", n: "弓箭手 麗可" }, { r: "最上級", n: "弓箭手 賽普艾" },
        { r: "最上級", n: "盜賊 史黛" }, { r: "最上級", n: "盜賊 多仁" }, { r: "最上級", n: "盜賊 派克斯" },
        { r: "最上級", n: "海盜 梅利爾" }, { r: "最上級", n: "海盜 亞伊" }, { r: "最上級", n: "海盜 BOON" },

        // 上級 (10)
        { r: "上級", n: "劍士 萊昂內爾" }, { r: "上級", n: "劍士 齊格" },
        { r: "上級", n: "法師 艾爾比昂" }, { r: "上級", n: "法師 梅里" },
        { r: "上級", n: "弓箭手 普蕾伊" }, { r: "上級", n: "弓箭手 艾拉" },
        { r: "上級", n: "盜賊 米勒爾" }, { r: "上級", n: "盜賊 丹尼爾" },
        { r: "上級", n: "海盜 穆利" }, { r: "上級", n: "海盜 查理" },

        // 中級 (8)
        { r: "中級", n: "劍士 羅維亞娜" }, { r: "中級", n: "劍士 庫拉" },
        { r: "中級", n: "法師 麗安" }, { r: "中級", n: "法師 亞利" },
        { r: "中級", n: "弓箭手 詹姆" }, { r: "中級", n: "弓箭手 希露迪" },
        { r: "中級", n: "盜賊 菲格" },
        { r: "中級", n: "海盜 虎克" },

        // 下級 (5)
        { r: "下級", n: "劍士 索爾" },
        { r: "下級", n: "法師 娜美" },
        { r: "下級", n: "弓箭手 芭芭" },
        { r: "下級", n: "盜賊 尼爾" },
        { r: "下級", n: "海盜 萊納爾" }
    ];

    const body = document.getElementById('list-body');
    const KEY = 'abyss_v5_final_sorted'; // 更新儲存鍵名以避免舊資料混淆
    const saved = JSON.parse(localStorage.getItem(KEY) || "[]");

    data.forEach((item, idx) => {
        const tr = document.createElement('tr');
        const job = item.n.split(' ')[0]; // 自動抓取前面的職業名稱
        tr.innerHTML = `<td class="member-name cat-${job}"><span class="rank rank-${item.r}">${item.r}</span>${item.n}</td>`;
        for (let i = 0; i < 5; i++) {
            const td = document.createElement('td');
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.checked = !!saved[idx * 5 + i];
            cb.onchange = () => {
                const current = JSON.parse(localStorage.getItem(KEY) || "[]");
                current[idx * 5 + i] = cb.checked;
                localStorage.setItem(KEY, JSON.stringify(current));
            };
            td.onclick = (e) => { if(e.target !== cb) { cb.click(); } };
            td.appendChild(cb);
            tr.appendChild(td);
        }
        body.appendChild(tr);
    });

    function clearData() { if(confirm("確定清空嗎？")) { localStorage.removeItem(KEY); location.reload(); } }
    function exportCode() { prompt("複製代碼分享給朋友（或自行備份）：", btoa(localStorage.getItem(KEY) || "[]")); }
</script>
</body>
</html>
