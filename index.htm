<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>深淵遠征隊 第5季 - 多帳號獨立追蹤工具</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .header-section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        .account-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 30px; border-top: 5px solid #34495e; }
        h2 { color: #2c3e50; margin-top: 0; }
        h3 { color: #34495e; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .btn-group { margin-top: 15px; display: flex; justify-content: center; gap: 10px; }
        
        table { border-collapse: collapse; width: 100%; margin-top: 10px; }
        th, td { border: 1px solid #e0e0e0; padding: 10px; text-align: center; }
        th { background-color: #34495e; color: white; position: sticky; top: 0; z-index: 5; }
        
        .rank { font-size: 11px; padding: 2px 6px; border-radius: 4px; color: white; margin-right: 8px; display: inline-block; min-width: 45px; text-align: center; }
        .rank-特殊 { background-color: #c0392b; animation: glow 1.5s infinite alternate; }
        .rank-特級 { background-color: #e67e22; }
        .rank-最上級 { background-color: #8e44ad; }
        .rank-上級 { background-color: #2980b9; }
        .rank-中級 { background-color: #27ae60; }
        .rank-下級 { background-color: #95a5a6; }
        @keyframes glow { from { box-shadow: 0 0 5px #ff0000; } to { box-shadow: 0 0 10px #ff0000; } }
        
        .member-name { text-align: left; font-weight: bold; border-left: 5px solid #ccc; padding-left: 10px; }
        .cat-劍士 { border-left-color: #e74c3c; }
        .cat-法師 { border-left-color: #3498db; }
        .cat-弓箭手 { border-left-color: #2ecc71; }
        .cat-盜賊 { border-left-color: #9b59b6; }
        .cat-海盜 { border-left-color: #f1c40f; }
        
        .is-checked { background-color: #e8f5e9 !important; }
        input[type="checkbox"] { transform: scale(1.5); cursor: pointer; }
        
        button { padding: 10px 20px; border-radius: 6px; border: none; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #3498db; }
        .btn-add:hover { background: #2980b9; }
        .btn-clear { background: #e74c3c; }
        .btn-export { background: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h2>深淵遠征隊 第5季 傭兵追蹤系統</h2>
        <div class="btn-group">
            <button class="btn-add" onclick="addAccount()">＋ 新增帳號表格</button>
            <button class="btn-export" onclick="exportData()">備份數據</button>
            <button class="btn-clear" onclick="clearAll()">清空全部</button>
        </div>
    </div>

    <div id="account-container">
        </div>
</div>

<script>
    const jobOrder = { "劍士": 1, "法師": 2, "弓箭手": 3, "盜賊": 4, "海盜": 5 };
    const rankOrder = { "特殊": 1, "特級": 2, "最上級": 3, "上級": 4, "中級": 5, "下級": 6 };

    const rawData = [
        { id: 1, r: "特殊", n: "盜賊 芬" },
        { id: 2, r: "特級", n: "劍士 斯托尼" }, { id: 3, r: "特級", n: "劍士 多藝" }, { id: 4, r: "特級", n: "劍士 貝魯" },
        { id: 5, r: "特級", n: "法師 利美" }, { id: 6, r: "特級", n: "法師 寧寧" },
        { id: 7, r: "特級", n: "弓箭手 松松" }, { id: 8, r: "特級", n: "弓箭手 伊斯頓" },
        { id: 9, r: "特級", n: "盜賊 汀汀" }, { id: 10, r: "特級", n: "盜賊 西河" },
        { id: 11, r: "特級", n: "海盜 雅各布" }, { id: 12, r: "特級", n: "海盜 哈魯艾爾" }, { id: 13, r: "特級", n: "海盜 艾拉尼" },
        { id: 14, r: "最上級", n: "劍士 瑪諾斯" }, { id: 15, r: "最上級", n: "劍士 巴隆" },
        { id: 16, r: "最上級", n: "法師 布里艾" }, { id: 17, r: "最上級", n: "法師 莉莎貝爾" }, { id: 18, r: "最上級", n: "法師 露娜" },
        { id: 19, r: "最上級", n: "弓箭手 賽爾文" }, { id: 20, r: "最上級", n: "弓箭手 伊拉達" },
        { id: 21, r: "最上級", n: "盜賊 潔克琳" }, { id: 22, r: "最上級", n: "盜賊 羅薩里奧" }, { id: 23, r: "最上級", n: "盜賊 庫娜" },
        { id: 24, r: "最上級", n: "海盜 Boom" }, { id: 25, r: "最上級", n: "海盜 冬天" },
        { id: 26, r: "上級", n: "劍士 阿諾德" }, { id: 27, r: "上級", n: "劍士 傑因" },
        { id: 28, r: "上級", n: "法師 舒布拉" }, { id: 29, r: "上級", n: "法師 艾爾拉" }, { id: 30, r: "上級", n: "法師 卡婭" },
        { id: 31, r: "上級", n: "弓箭手 洛尼" }, { id: 32, r: "上級", n: "弓箭手 馬可" },
        { id: 33, r: "上級", n: "盜賊 幸運" }, { id: 34, r: "上級", n: "盜賊 多仁" },
        { id: 35, r: "上級", n: "海盜 梅利爾" }, { id: 36, r: "上級", n: "海盜 在伊" },
        { id: 37, r: "中級", n: "劍士 萊爾普" }, { id: 38, r: "中級", n: "劍士 西林" },
        { id: 39, r: "中級", n: "法師 艾爾比絲" }, { id: 40, r: "中級", n: "法師 梅里" },
        { id: 41, r: "中級", n: "弓箭手 普雷伊" }, { id: 42, r: "中級", n: "弓箭手 江江" }, { id: 43, r: "中級", n: "弓箭手 凱羅" },
        { id: 44, r: "中級", n: "盜賊 米斯緹" }, { id: 45, r: "中級", n: "盜賊 丹尼爾" },
        { id: 46, r: "中級", n: "海盜 修莉" }, { id: 47, r: "中級", n: "海盜 吉恩" },
        { id: 48, r: "下級", n: "劍士 裴斯" }, { id: 49, r: "下級", n: "劍士 羅迪亞娜" }, { id: 50, r: "下級", n: "劍士 塔拉" },
        { id: 51, r: "下級", n: "法師 娜美" }, { id: 52, r: "下級", n: "法師 麗安" }, { id: 53, r: "下級", n: "法師 哲利" },
        { id: 54, r: "下級", n: "弓箭手 比爾" }, { id: 55, r: "下級", n: "弓箭手 倉武" }, { id: 56, r: "下級", n: "弓箭手 布雷迪" },
        { id: 57, r: "下級", n: "盜賊 尼爾" }, { id: 58, r: "下級", n: "盜賊 餅乾" },
        { id: 59, r: "下級", n: "海盜 奧莉薇" }, { id: 60, r: "下級", n: "海盜 虎克" }, { id: 61, r: "下級", n: "海盜 星星家" }
    ];

    const STORAGE_KEY = 'abyss_multi_account_v3';
    let appState = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"count": 1, "checks": {}}');

    function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
    }

    function renderAll() {
        const container = document.getElementById('account-container');
        container.innerHTML = '';
        for (let i = 1; i <= appState.count; i++) {
            renderAccount(i);
        }
    }

    function renderAccount(accNum) {
        const container = document.getElementById('account-container');
        const card = document.createElement('div');
        card.className = 'account-card';
        card.innerHTML = `<h3>帳號 ${accNum}</h3>`;

        const table = document.createElement('table');
        table.innerHTML = `<thead><tr><th width="70%">傭兵名稱 (等級/職業)</th><th>已獲得</th></tr></thead>`;
        const tbody = document.createElement('tbody');

        // 排序邏輯：針對目前帳號(accNum)進行排序
        const sortedData = [...rawData].sort((a, b) => {
            const aChecked = appState.checks[`${accNum}-${a.id}`];
            const bChecked = appState.checks[`${accNum}-${b.id}`];
            if (aChecked && !bChecked) return -1;
            if (!aChecked && bChecked) return 1;
            
            if (aChecked && bChecked) {
                if (rankOrder[a.r] !== rankOrder[b.r]) return rankOrder[a.r] - rankOrder[b.r];
                return jobOrder[a.n.split(' ')[0]] - jobOrder[b.n.split(' ')[0]];
            }
            const aJob = a.n.split(' ')[0];
            const bJob = b.n.split(' ')[0];
            if (jobOrder[aJob] !== jobOrder[bJob]) return jobOrder[aJob] - jobOrder[bJob];
            return rankOrder[a.r] - rankOrder[b.r];
        });

        sortedData.forEach(item => {
            const tr = document.createElement('tr');
            const job = item.n.split(' ')[0];
            const isChecked = appState.checks[`${accNum}-${item.id}`];
            if (isChecked) tr.className = 'is-checked';

            tr.innerHTML = `
                <td class="member-name cat-${job}"><span class="rank rank-${item.r}">${item.r}</span>${item.n}</td>
                <td><input type="checkbox" ${isChecked ? 'checked' : ''}></td>
            `;

            const cb = tr.querySelector('input');
            cb.onchange = () => {
                appState.checks[`${accNum}-${item.id}`] = cb.checked;
                saveState();
                renderAll(); // 重新整理所有表格排序
            };
            tr.onclick = (e) => { if(e.target !== cb) cb.click(); };
            tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        card.appendChild(table);
        container.appendChild(card);
    }

    function addAccount() {
        if (appState.count < 5) {
            appState.count++;
            saveState();
            renderAll();
        } else {
            alert("最多支援 5 個帳號表格喔！");
        }
    }

    function clearAll() {
        if (confirm("確定要重置嗎？會恢復到只有一個帳號且勾選全清空。")) {
            appState = {count: 1, checks: {}};
            saveState();
            renderAll();
        }
    }

    function exportData() {
        prompt("請複製以下備份代碼：", btoa(JSON.stringify(appState)));
    }

    // 初始化啟動
    renderAll();
</script>
</body>
</html>
