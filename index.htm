<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>深淵遠征隊 第5季 - 傭兵自動排序工具</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .btn-group { display: flex; justify-content: space-between; margin-bottom: 15px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #e0e0e0; padding: 12px; text-align: center; }
        th { background-color: #34495e; color: white; position: sticky; top: 0; z-index: 10; }
        .rank { font-size: 11px; padding: 2px 6px; border-radius: 4px; color: white; margin-right: 8px; display: inline-block; min-width: 50px; text-align: center; }
        .rank-特殊 { background-color: #c0392b; animation: glow 1.5s infinite alternate; }
        .rank-特級 { background-color: #e67e22; }
        .rank-最上級 { background-color: #8e44ad; }
        .rank-上級 { background-color: #2980b9; }
        .rank-中級 { background-color: #27ae60; }
        .rank-下級 { background-color: #95a5a6; }
        @keyframes glow { from { box-shadow: 0 0 5px #ff0000; } to { box-shadow: 0 0 15px #ff0000; } }
        .member-name { text-align: left; font-weight: bold; border-left: 6px solid #ccc; padding-left: 10px; }
        .cat-盜賊 { border-left-color: #9b59b6; background-color: #fbf4ff; }
        .cat-劍士 { border-left-color: #e74c3c; background-color: #fffafa; }
        .cat-法師 { border-left-color: #3498db; background-color: #f4faff; }
        .cat-弓箭手 { border-left-color: #2ecc71; background-color: #f4fff6; }
        .cat-海盜 { border-left-color: #f1c40f; background-color: #fffcf4; }
        .is-checked { background-color: #e8f5e9 !important; } /* 已勾選的列顏色稍微變綠 */
        tr:hover td { background-color: #eaeaea !important; }
        input[type="checkbox"] { transform: scale(1.6); cursor: pointer; }
        button { padding: 8px 15px; border-radius: 5px; border: none; color: white; cursor: pointer; font-weight: bold; }
        .btn-clear { background: #e74c3c; }
        .btn-export { background: #27ae60; }
    </style>
</head>
<body>
<div class="container">
    <h2>深淵遠征隊 第5季 傭兵追蹤 (勾選自動置頂)</h2>
    <div class="btn-group">
        <button class="btn-clear" onclick="clearData()">清空所有紀錄</button>
        <button class="btn-export" onclick="exportCode()">分享/備份代碼</button>
    </div>
    <table id="mercenary-table">
        <thead>
            <tr>
                <th width="35%">傭兵名稱 (等級/職業)</th>
                <th>帳 1</th><th>帳 2</th><th>帳 3</th><th>帳 4</th><th>帳 5</th>
            </tr>
        </thead>
        <tbody id="list-body"></tbody>
    </table>
</div>

<script>
    const data = [
        { id: 1, r: "特殊", n: "盜賊 芬", order: 10 },
        { id: 2, r: "特級", n: "劍士 斯托尼", order: 21 }, { id: 3, r: "特級", n: "劍士 多藝", order: 21 }, { id: 4, r: "特級", n: "劍士 貝魯", order: 21 },
        { id: 5, r: "特級", n: "法師 利美", order: 22 }, { id: 6, r: "特級", n: "法師 寧寧", order: 22 },
        { id: 7, r: "特級", n: "弓箭手 松松", order: 23 }, { id: 8, r: "特級", n: "弓箭手 伊斯頓", order: 23 },
        { id: 9, r: "特級", n: "盜賊 汀汀", order: 24 }, { id: 10, r: "特級", n: "盜賊 西河", order: 24 },
        { id: 11, r: "特級", n: "海盜 雅各布", order: 25 }, { id: 12, r: "特級", n: "海盜 哈魯艾爾", order: 25 }, { id: 13, r: "特級", n: "海盜 艾拉尼", order: 25 },
        { id: 14, r: "最上級", n: "劍士 瑪諾斯", order: 31 }, { id: 15, r: "最上級", n: "劍士 巴隆", order: 31 },
        { id: 16, r: "最上級", n: "法師 布里艾", order: 32 }, { id: 17, r: "最上級", n: "法師 莉莎貝爾", order: 32 }, { id: 18, r: "最上級", n: "法師 露娜", order: 32 },
        { id: 19, r: "最上級", n: "弓箭手 賽爾文", order: 33 }, { id: 20, r: "最上級", n: "弓箭手 伊拉達", order: 33 },
        { id: 21, r: "最上級", n: "盜賊 潔克琳", order: 34 }, { id: 22, r: "最上級", n: "盜賊 羅薩里奧", order: 34 }, { id: 23, r: "最上級", n: "盜賊 庫娜", order: 34 },
        { id: 24, r: "最上級", n: "海盜 Boom", order: 35 }, { id: 25, r: "最上級", n: "海盜 冬天", order: 35 },
        { id: 26, r: "上級", n: "劍士 阿諾德", order: 41 }, { id: 27, r: "上級", n: "劍士 傑因", order: 41 },
        { id: 28, r: "上級", n: "法師 舒布拉", order: 42 }, { id: 29, r: "上級", n: "法師 艾爾拉", order: 42 }, { id: 30, r: "上級", n: "法師 卡婭", order: 42 },
        { id: 31, r: "上級", n: "弓箭手 洛尼", order: 43 }, { id: 32, r: "上級", n: "弓箭手 馬可", order: 43 },
        { id: 33, r: "上級", n: "盜賊 幸運", order: 44 }, { id: 34, r: "上級", n: "盜賊 多仁", order: 44 },
        { id: 35, r: "上級", n: "海盜 梅利爾", order: 45 }, { id: 36, r: "上級", n: "海盜 在伊", order: 45 },
        { id: 37, r: "中級", n: "劍士 萊爾普", order: 51 }, { id: 38, r: "中級", n: "劍士 西林", order: 51 },
        { id: 39, r: "中級", n: "法師 艾爾比絲", order: 52 }, { id: 40, r: "中級", n: "法師 梅里", order: 52 },
        { id: 41, r: "中級", n: "弓箭手 普雷伊", order: 53 }, { id: 42, r: "中級", n: "弓箭手 江江", order: 53 }, { id: 43, r: "中級", n: "弓箭手 凱羅", order: 53 },
        { id: 44, r: "中級", n: "盜賊 米斯緹", order: 54 }, { id: 45, r: "中級", n: "盜賊 丹尼爾", order: 54 },
        { id: 46, r: "中級", n: "海盜 修莉", order: 55 }, { id: 47, r: "中級", n: "海盜 吉恩", order: 55 },
        { id: 48, r: "下級", n: "劍士 裴斯", order: 61 }, { id: 49, r: "下級", n: "劍士 羅迪亞娜", order: 61 }, { id: 50, r: "下級", n: "劍士 塔拉", order: 61 },
        { id: 51, r: "下級", n: "法師 娜美", order: 62 }, { id: 52, r: "下級", n: "法師 麗安", order: 62 }, { id: 53, r: "下級", n: "法師 哲利", order: 62 },
        { id: 54, r: "下級", n: "弓箭手 比爾", order: 63 }, { id: 55, r: "下級", n: "弓箭手 倉武", order: 63 }, { id: 56, r: "下級", n: "弓箭手 布雷迪", order: 63 },
        { id: 57, r: "下級", n: "盜賊 尼爾", order: 64 }, { id: 58, r: "下級", n: "盜賊 餅乾", order: 64 },
        { id: 59, r: "下級", n: "海盜 奧莉薇", order: 65 }, { id: 60, r: "下級", n: "海盜 虎克", order: 65 }, { id: 61, r: "下級", n: "海盜 星星家", order: 65 }
    ];

    const KEY = 'abyss_v5_sorting_v2';
    const body = document.getElementById('list-body');

    function renderTable() {
        const saved = JSON.parse(localStorage.getItem(KEY) || "{}");
        
        // 排序邏輯：1. 只要任一帳號有勾選就排前面 2. 原始等級職業順序
        const sortedData = [...data].sort((a, b) => {
            const aChecked = [1,2,3,4,5].some(num => saved[`${a.id}-${num}`]);
            const bChecked = [1,2,3,4,5].some(num => saved[`${b.id}-${num}`]);
            if (aChecked && !bChecked) return -1;
            if (!aChecked && bChecked) return 1;
            return a.order - b.order;
        });

        body.innerHTML = '';
        sortedData.forEach(item => {
            const tr = document.createElement('tr');
            const job = item.n.split(' ')[0];
            const hasAnyCheck = [1,2,3,4,5].some(num => saved[`${item.id}-${num}`]);
            if (hasAnyCheck) tr.classList.add('is-checked');

            tr.innerHTML = `<td class="member-name cat-${job}"><span class="rank rank-${item.r}">${item.r}</span>${item.n}</td>`;
            
            for (let i = 1; i <= 5; i++) {
                const td = document.createElement('td');
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.checked = !!saved[`${item.id}-${i}`];
                cb.onchange = () => {
                    const current = JSON.parse(localStorage.getItem(KEY) || "{}");
                    current[`${item.id}-${i}`] = cb.checked;
                    localStorage.setItem(KEY, JSON.stringify(current));
                    renderTable(); // 勾選後立即重繪排序
                };
                td.onclick = (e) => { if(e.target !== cb) { cb.click(); } };
                td.appendChild(cb);
                tr.appendChild(td);
            }
            body.appendChild(tr);
        });
    }

    function clearData() { if(confirm("確定清空嗎？")) { localStorage.removeItem(KEY); renderTable(); } }
    function exportCode() { prompt("複製代碼分享/備份：", btoa(localStorage.getItem(KEY) || "{}")); }

    renderTable();
</script>
</body>
</html>
